name: Swift Testing

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.swift'
      - '**/Package.swift'
      - '.github/workflows/swift-testing.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**/*.swift'
      - '**/Package.swift'
      - '.github/workflows/swift-testing.yml'
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  test:
    name: Swift Testing Suite
    runs-on: macos-14  # Uses M1 Mac for better performance
    timeout-minutes: 30
    
    strategy:
      matrix:
        xcode: ['15.2']
        ios: ['17.2']
        include:
          - xcode: '15.2'
            ios: '17.2'
            simulator: 'iPhone 15 Pro'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer
        xcodebuild -version
        swift --version
        
    - name: Cache Swift Package Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
          ~/.swiftpm
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
          
    - name: Setup Simulator
      run: |
        xcrun simctl list devices
        xcrun simctl boot "${{ matrix.simulator }}" || true
        
    - name: Resolve Dependencies
      run: |
        cd Nuri
        xcodebuild -resolvePackageDependencies \
          -scheme Nuri \
          -destination 'platform=iOS Simulator,name=${{ matrix.simulator }},OS=${{ matrix.ios }}'
          
    - name: Build Tests
      run: |
        cd Nuri
        set -o pipefail
        xcodebuild build-for-testing \
          -scheme Nuri \
          -destination 'platform=iOS Simulator,name=${{ matrix.simulator }},OS=${{ matrix.ios }}' \
          -derivedDataPath DerivedData \
          -clonedSourcePackagesDirPath .swiftpm \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          ONLY_ACTIVE_ARCH=YES \
          | xcpretty --color
          
    - name: Run Swift Tests
      run: |
        cd Nuri
        set -o pipefail
        xcodebuild test-without-building \
          -scheme Nuri \
          -destination 'platform=iOS Simulator,name=${{ matrix.simulator }},OS=${{ matrix.ios }}' \
          -derivedDataPath DerivedData \
          -resultBundlePath TestResults.xcresult \
          -test-timeouts-enabled YES \
          -maximum-test-execution-time-allowance 60 \
          -parallel-testing-enabled YES \
          -maximum-parallel-test-workers 4 \
          | xcpretty --test --color
          
    - name: Process Test Results
      if: always()
      run: |
        cd Nuri
        if [ -d "TestResults.xcresult" ]; then
          # Generate human-readable test report
          xcrun xcresulttool get --format human --path TestResults.xcresult > test-report.txt
          
          # Extract test summary
          echo "📊 Test Summary:"
          xcrun xcresulttool get --format json --path TestResults.xcresult | \
            python3 -c "
import sys, json
data = json.load(sys.stdin)
metrics = data.get('metrics', {})
tests = metrics.get('testsMetrics', {})
print(f\"✅ Passed: {tests.get('testsPassedCount', 0)}\")
print(f\"❌ Failed: {tests.get('testsFailedCount', 0)}\")
print(f\"⏭️ Skipped: {tests.get('testsSkippedCount', 0)}\")
print(f\"⏱️ Duration: {metrics.get('duration', 0):.2f}s\")
"
        fi
        
    - name: Generate Code Coverage
      if: always()
      run: |
        cd Nuri
        if [ -d "TestResults.xcresult" ]; then
          # Generate coverage report
          xcrun xccov view --report --json TestResults.xcresult > coverage.json
          
          # Extract coverage percentage
          echo "📈 Code Coverage:"
          python3 -c "
import sys, json
data = json.load(open('coverage.json'))
for target in data.get('targets', []):
    if 'Nuri' in target.get('name', ''):
        coverage = target.get('lineCoverage', 0) * 100
        print(f\"{target['name']}: {coverage:.1f}%\")
"
        fi
        
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.xcode }}-${{ matrix.ios }}
        path: |
          Nuri/TestResults.xcresult
          Nuri/test-report.txt
          Nuri/coverage.json
        retention-days: 30
        
    - name: Upload Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v4
      with:
        directory: ./Nuri
        files: ./coverage.json
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        
    - name: Comment PR with Test Results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = './Nuri/test-report.txt';
          
          if (fs.existsSync(path)) {
            const report = fs.readFileSync(path, 'utf8');
            const summary = report.substring(0, 1000); // First 1000 chars
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Test Results\n\`\`\`\n${summary}\n\`\`\`\n`
            });
          }