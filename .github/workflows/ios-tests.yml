name: iOS Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  test:
    name: Run Tests
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: |
        echo "Available Xcode versions:"
        ls /Applications | grep Xcode
        sudo xcode-select -p
        
    - name: Show Swift version
      run: swift --version
      
    - name: Show Xcode version
      run: xcodebuild -version
      
    - name: Resolve Package Dependencies
      run: |
        cd Nuri
        xcodebuild -resolvePackageDependencies \
          -scheme Nuri \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest'
          
    - name: Build for Testing
      run: |
        cd Nuri
        xcodebuild build-for-testing \
          -scheme Nuri \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
          -derivedDataPath build \
          -quiet
          
    - name: Run Tests
      run: |
        cd Nuri
        xcodebuild test-without-building \
          -scheme Nuri \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
          -derivedDataPath build \
          -resultBundlePath TestResults \
          -quiet \
          | xcpretty --test --color || exit ${PIPESTATUS[0]}
          
    - name: Upload Test Results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: Nuri/TestResults
        
  swift-testing:
    name: Run Swift Tests
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        
    - name: Run Swift Tests
      run: |
        cd Nuri
        swift test --enable-testing-library
      continue-on-error: true
      
    - name: Run Tests with xcodebuild (Swift Testing)
      run: |
        cd Nuri
        xcodebuild test \
          -scheme Nuri \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
          -enableCodeCoverage YES \
          -resultBundlePath TestResults.xcresult \
          | xcpretty --test --color || exit ${PIPESTATUS[0]}
          
    - name: Generate Code Coverage Report
      run: |
        cd Nuri
        xcrun xccov view --report TestResults.xcresult > coverage.txt
        echo "Code Coverage Summary:"
        head -20 coverage.txt
        
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: Nuri/coverage.txt