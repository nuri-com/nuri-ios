<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Privy Passkey Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>html,body{margin:0;padding:0;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#f6f6f6}</style>
</head>
<body>
<h3>Starting Passkey flow…</h3>
<script src="https://cdn.jsdelivr.net/npm/@privy-io/react-auth@latest"></script>
<script>
(async function(){
  const APP_ID = 'cmaz6gvx500zykw0lfnlv4lrb';
  const CLIENT_ID = 'client-WY6LLkqWnXYc7pzZRgxosYUCiSHddSsfUaYnW2E9rA1rV';
  const RELYING_PARTY = 'https://nuri.com';
  try {
    const privy = Privy.createPrivyClient({appId: APP_ID, clientId: CLIENT_ID, loginMethods: ['passkey']});
    await privy.loginWithPasskey({relyingParty: RELYING_PARTY});
    window.webkit?.messageHandlers?.privy?.postMessage('success');
  } catch (err) {
    window.webkit?.messageHandlers?.privy?.postMessage('error:' + (err?.message || 'unknown'));
  }
})();
</script>
</body>
</html>
