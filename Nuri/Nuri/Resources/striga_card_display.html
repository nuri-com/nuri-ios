<!doctype html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Striga Card Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            background: white;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        
        .card-container {
            background: white;
            padding: 24px 20px;
            width: 100%;
            height: 100%;
        }
        
        .label {
            font-size: 12px;
            color: #B794F4;  /* Lilac color */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
            font-weight: 600;
        }
        
        .field {
            margin-bottom: 32px;
        }
        
        #cardHolder {
            color: #000;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        
        #cardNumber {
            background: transparent;
            border: none;
            height: 36px;
            display: block;
            width: 100%;
        }
        
        #cardNumber iframe {
            border: none !important;
            background: transparent !important;
            width: 100% !important;
            overflow: hidden !important;
        }
        
        .row {
            display: flex;
            gap: 50px;
        }
        
        .row .field {
            flex: 1;
        }
        
        #expiry {
            color: #000;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        #cvv {
            background: transparent;
            border: none;
            height: 36px;
            display: block;
            width: 100px;
        }
        
        #cvv iframe {
            border: none !important;
            background: transparent !important;
            overflow: hidden !important;
        }
        
        #status {
            display: none;
        }
        
        /* Prevent any zooming */
        input, textarea, select {
            font-size: 16px !important;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="field">
            <div class="label">Card Holder</div>
            <div id="cardHolder"></div>
        </div>
        
        <div class="field">
            <div class="label">Card Number</div>
            <div id="cardNumber"></div>
        </div>
        
        <div class="row">
            <div class="field">
                <div class="label">Expires</div>
                <div id="expiry"></div>
            </div>
            <div class="field">
                <div class="label">CVV</div>
                <div id="cvv"></div>
            </div>
        </div>
    </div>
    <div id="status"></div>
    
    <!-- Load Striga SDK -->
    <script src="https://www.vault.striga.eu/web/sandbox/v1.1/client.min.js"></script>
    
    <script>
        // Global state
        window.strigaReady = false;
        window.strigaInitialized = false;
        window.cardData = {
            number: '',
            cvv: ''
        };
        
        // Debug logging
        function log(msg) {
            console.log(msg);
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.strigaNative) {
                window.webkit.messageHandlers.strigaNative.postMessage({
                    type: 'log',
                    data: msg
                });
            }
        }
        
        // Wait for SDK to load
        function waitForStriga(callback) {
            var attempts = 0;
            var check = setInterval(function() {
                attempts++;
                if (typeof StrigaUXPlugin !== 'undefined') {
                    clearInterval(check);
                    log('StrigaUXPlugin is available after ' + attempts + ' attempts');
                    callback();
                } else if (attempts > 30) {
                    clearInterval(check);
                    log('ERROR: StrigaUXPlugin never loaded');
                }
            }, 500);
        }
        
        // Initialize when ready
        waitForStriga(function() {
            window.strigaReady = true;
            log('Striga SDK is ready');
            // Auto-initialize if we have pending credentials
            if (window.pendingInit) {
                window.initStriga(window.pendingInit.uiSecret, window.pendingInit.applicationId);
            }
        });
        
        // Initialize Striga (called from Swift)
        window.initStriga = function(uiSecret, applicationId) {
            if (!window.strigaReady) {
                log('SDK not ready yet, storing credentials for later');
                window.pendingInit = { uiSecret: uiSecret, applicationId: applicationId };
                return false;
            }
            
            if (window.strigaInitialized) {
                log('Striga already initialized');
                return true;
            }
            
            try {
                StrigaUXPlugin.create(uiSecret, { applicationId: applicationId });
                window.strigaInitialized = true;
                log('Striga initialized successfully');
                
                // Signal to Swift that we're ready
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.strigaNative) {
                    window.webkit.messageHandlers.strigaNative.postMessage({
                        type: 'ready'
                    });
                }
                return true;
            } catch(e) {
                log('ERROR: Failed to initialize Striga: ' + e);
                return false;
            }
        };
        
        // Request consent
        window.requestConsent = function(userId, channel) {
            log('requestConsent called: ' + userId);
            
            if (typeof StrigaUXPlugin === 'undefined') {
                log('ERROR: StrigaUXPlugin not available');
                return;
            }
            
            if (!window.strigaInitialized) {
                log('ERROR: Striga not initialized - call initStriga first');
                return;
            }
            
            var params = { userId: userId };
            if (channel) params.channel = channel;
            
            StrigaUXPlugin.requestConsent(params).then(function(result) {
                log('Got consent result: ' + JSON.stringify(result));
                
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.strigaNative) {
                    window.webkit.messageHandlers.strigaNative.postMessage({
                        type: 'challenge',
                        data: result
                    });
                }
            }).catch(function(e) {
                log('ERROR: requestConsent failed: ' + e);
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.strigaNative) {
                    window.webkit.messageHandlers.strigaNative.postMessage({
                        type: 'error',
                        data: String(e)
                    });
                }
            });
        };
        
        // Render card with ALL details
        window.renderCard = function(cardId, authToken) {
            log('renderCard called: ' + cardId);
            
            if (typeof StrigaUXPlugin === 'undefined') {
                log('ERROR: StrigaUXPlugin not available');
                return;
            }
            
            if (!window.strigaInitialized) {
                log('ERROR: Striga not initialized');
                return;
            }
            
            // Card details (name, expiry) are set from Swift
            
            // Render FULL unmasked card number with auth token
            StrigaUXPlugin.render('cardNumber', { 
                id: 'cardNumber',
                cardId: cardId, 
                authToken: authToken,  // THIS IS CRITICAL for unmasked display
                hideData: false,  // Show the data, not hidden
                style: {
                    color: '#000',
                    'font-family': "'SF Mono', Monaco, 'Courier New', monospace",
                    'font-size': '24px',
                    'letter-spacing': '3px',
                    'padding': '0',
                    'font-weight': '700',
                    'line-height': '36px',
                    'background': 'transparent',
                    'text-align': 'left'
                }
            }).then(function() {
                log('Card number rendered');
                
                // Then render FULL unmasked CVV with auth token
                return StrigaUXPlugin.render('cvv', { 
                    id: 'cvv',
                    cardId: cardId, 
                    authToken: authToken,  // THIS IS CRITICAL for unmasked display
                    hideData: false,  // Show the data, not hidden
                    style: {
                        color: '#000',
                        'font-family': "'SF Mono', Monaco, 'Courier New', monospace",
                        'font-size': '24px',
                        'letter-spacing': '3px',
                        'padding': '0',
                        'font-weight': '700',
                        'line-height': '36px',
                        'background': 'transparent',
                        'text-align': 'left'
                    }
                });
            }).then(function() {
                log('CVV rendered');
                
                // Try multiple methods to extract the rendered values
                setTimeout(function() {
                    log('Attempting to extract card data...');
                    
                    var cardNumberFrame = document.querySelector('#cardNumber iframe');
                    var cvvFrame = document.querySelector('#cvv iframe');
                    
                    // Method 1: Direct iframe access (usually blocked)
                    try {
                        if (cardNumberFrame && cardNumberFrame.contentWindow) {
                            var doc = cardNumberFrame.contentWindow.document;
                            var cardText = doc.body.innerText || doc.body.textContent;
                            log('Method 1 - Card number extracted: ' + cardText);
                        }
                    } catch(e) {
                        log('Method 1 failed: ' + e.message);
                    }
                    
                    // Method 2: PostMessage interception
                    try {
                        window.addEventListener('message', function(event) {
                            log('Received postMessage from: ' + event.origin);
                            log('Message data: ' + JSON.stringify(event.data));
                        });
                    } catch(e) {
                        log('Method 2 setup failed: ' + e.message);
                    }
                    
                    // Method 3: MutationObserver on iframe
                    try {
                        if (cardNumberFrame) {
                            var observer = new MutationObserver(function(mutations) {
                                mutations.forEach(function(mutation) {
                                    log('Iframe mutation detected: ' + mutation.type);
                                    if (mutation.type === 'attributes') {
                                        log('Attribute changed: ' + mutation.attributeName);
                                    }
                                });
                            });
                            observer.observe(cardNumberFrame, { attributes: true, childList: true, subtree: true });
                            log('Method 3 - MutationObserver attached');
                        }
                    } catch(e) {
                        log('Method 3 failed: ' + e.message);
                    }
                    
                    // Method 4: Override iframe createElement
                    try {
                        var originalCreateElement = document.createElement;
                        document.createElement = function(tagName) {
                            var element = originalCreateElement.call(document, tagName);
                            if (tagName.toLowerCase() === 'iframe') {
                                log('Iframe created, attempting to hook onload');
                                element.onload = function() {
                                    log('Iframe loaded: ' + element.src);
                                    setTimeout(function() {
                                        try {
                                            var content = element.contentWindow.document.body.innerText;
                                            log('Iframe content: ' + content);
                                        } catch(e) {
                                            log('Cannot read iframe content: ' + e.message);
                                        }
                                    }, 100);
                                };
                            }
                            return element;
                        };
                        log('Method 4 - createElement override installed');
                    } catch(e) {
                        log('Method 4 failed: ' + e.message);
                    }
                    
                    // Method 5: Check for Striga plugin internals
                    try {
                        if (window.StrigaUXPlugin && window.StrigaUXPlugin._internal) {
                            log('Striga internals found: ' + JSON.stringify(Object.keys(window.StrigaUXPlugin._internal || {})));
                        }
                        // Check for any stored card data
                        for (var key in window) {
                            if (key.toLowerCase().includes('card') || key.toLowerCase().includes('striga')) {
                                if (typeof window[key] === 'string' && window[key].match(/\d{4}\s?\d{4}\s?\d{4}\s?\d{4}/)) {
                                    log('Found potential card data in window.' + key + ': ' + window[key]);
                                }
                            }
                        }
                    } catch(e) {
                        log('Method 5 failed: ' + e.message);
                    }
                    
                    // Send rendered notification
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.strigaNative) {
                        window.webkit.messageHandlers.strigaNative.postMessage({
                            type: 'rendered'
                        });
                    }
                }, 1000); // Delay to ensure rendering is complete
            }).catch(function(e) {
                log('ERROR: renderCard failed: ' + e);
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.strigaNative) {
                    window.webkit.messageHandlers.strigaNative.postMessage({
                        type: 'error',
                        data: String(e)
                    });
                }
            });
        };
        
        // Set card details from Swift (name and expiry)
        window.setCardDetails = function(holder, expiry) {
            document.getElementById('cardHolder').innerText = holder.toUpperCase();
            document.getElementById('expiry').innerText = expiry;
        };
    </script>
</body>
</html>
